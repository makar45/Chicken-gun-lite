<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Gun Fixed</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; user-select: none; }
        
        /* КНОПКИ УПРАВЛЕНИЯ — САМЫЙ ВЕРХНИЙ СЛОЙ */
        #ui { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; pointer-events: none; }
        
        /* Джойстик слева */
        #j-base { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.3); border: 4px solid #fff; border-radius: 50%; pointer-events: auto; }
        #j-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; }

        /* Кнопка стрельбы справа */
        #f-btn { position: absolute; bottom: 60px; right: 60px; width: 110px; height: 110px; background: red; border: 5px solid #fff; border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; text-shadow: 1px 1px 2px #000; }

        /* Магазин */
        #s-btn { position: absolute; top: 20px; right: 20px; padding: 15px; background: gold; border: 2px solid #fff; pointer-events: auto; font-weight: bold; border-radius: 10px; }

        /* Меню входа */
        #login { position: absolute; inset: 0; background: #222; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; color: white; }
        input { padding: 10px; margin: 10px; width: 200px; text-align: center; }
        button.start { padding: 15px 30px; background: #ffcc00; border: none; font-weight: bold; border-radius: 5px; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid lime; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="login">
        <h1>CHICKEN GUN POCO</h1>
        <input type="text" id="nick" placeholder="НИКНЕЙМ">
        <button class="start" onclick="init('host')">СОЗДАТЬ</button>
        <div style="height: 10px;"></div>
        <input type="text" id="room" placeholder="ID КОМНАТЫ">
        <button class="start" style="background:#2196F3;" onclick="init('join')">ЗАЙТИ</button>
    </div>

    <div id="ui">
        <div id="crosshair"></div>
        <div id="j-base"><div id="j-stick"></div></div>
        <div id="f-btn">ОГОНЬ</div>
        <div id="s-btn" onclick="alert('Магазин откроется в бою!')">SHOP</div>
        <div style="position: absolute; top: 20px; left: 20px; color: white; font-family: sans-serif;">
            HP: <span id="hp-val">100</span><br>
            $: <span id="money">0</span>
        </div>
    </div>

    <a-scene renderer="antialias: false; precision: medium;">
        <a-assets>
            <a-asset-item id="map" src="./chicken_gun_chalohousesnow.glb"></a-asset-item>
            <a-asset-item id="chicken" src="./chicken_gun.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#87CEEB"></a-sky>
        <a-light type="ambient" intensity="0.9"></a-light>
        
        <a-entity gltf-model="#map"></a-entity>

        <a-entity id="rig" position="0 0 5">
            <a-entity id="camera" camera position="0 1.6 0" look-controls="enabled: false" raycaster="objects: .player; far: 50;">
                <a-entity position="0.3 -0.3 -0.5">
                    <a-box width="0.1" height="0.1" depth="0.4" color="#333"></a-box>
                </a-entity>
            </a-camera>
        </a-entity>

        <a-entity id="players"></a-entity>
    </a-scene>

    <script>
        let peer, conn, myNick;
        let mvX = 0, mvZ = 0, rotY = 0, rotX = 0;
        let hp = 100, money = 0;
        const rig = document.getElementById('rig');
        const cam = document.getElementById('camera');

        // --- УПРАВЛЕНИЕ КАМЕРОЙ (ПРАВАЯ СТОРОНА) ---
        let lx, ly;
        document.body.addEventListener('touchstart', e => {
            if (e.touches[0].clientX > window.innerWidth / 2) {
                lx = e.touches[0].clientX; ly = e.touches[0].clientY;
            }
        });
        document.body.addEventListener('touchmove', e => {
            for (let t of e.touches) {
                if (t.clientX > window.innerWidth / 2 && t.target.id !== 'f-btn') {
                    if (lx === undefined) return;
                    rotY -= (t.clientX - lx) * 0.4;
                    rotX = Math.max(-80, Math.min(80, rotX - (t.clientY - ly) * 0.4));
                    rig.setAttribute('rotation', `0 ${rotY} 0`);
                    cam.setAttribute('rotation', `${rotX} 0 0`);
                    lx = t.clientX; ly = t.clientY;
                }
            }
        });

        // --- ДЖОЙСТИК ---
        const jBase = document.getElementById('j-base');
        const jStick = document.getElementById('j-stick');
        jBase.addEventListener('touchmove', e => {
            e.preventDefault();
            let r = jBase.getBoundingClientRect();
            let cx = r.left + 60, cy = r.top + 60;
            let dx = e.touches[0].clientX - cx, dy = e.touches[0].clientY - cy;
            let d = Math.min(Math.sqrt(dx*dx + dy*dy), 45);
            let a = Math.atan2(dy, dx);
            jStick.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
            mvX = Math.cos(a) * (d/45); mvZ = Math.sin(a) * (d/45);
        });
        jBase.addEventListener('touchend', () => {
            jStick.style.transform = `translate(0,0)`;
            mvX = 0; mvZ = 0;
        });

        // --- СТРЕЛЬБА ---
        document.getElementById('f-btn').addEventListener('touchstart', e => {
            e.preventDefault();
            let hits = cam.components.raycaster.intersections;
            if (hits.length > 0) {
                let target = hits[0].object.el;
                if (target.classList.contains('player') && conn) {
                    conn.send({ type: 'hit', to: target.id.replace('p-', ''), dmg: 20 });
                }
            }
        });

        // --- СЕТЬ И ДВИЖЕНИЕ ---
        function init(mode) {
            myNick = document.getElementById('nick').value || "User";
            peer = new Peer(mode === 'host' ? 'cg-' + Math.floor(Math.random()*999) : undefined);
            peer.on('open', id => {
                if(mode === 'host') alert("ROOM ID: " + id);
                else conn = peer.connect(document.getElementById('room').value);
                
                if(mode === 'host') peer.on('connection', c => { conn = c; handleNet(); });
                else handleNet();

                document.getElementById('login').style.display = 'none';
                loop();
            });
        }

        function handleNet() {
            conn.on('data', d => {
                if (d.type === 'sync') {
                    let p = document.getElementById('p-' + d.nick);
                    if (!p) {
                        p = document.createElement('a-entity');
                        p.setAttribute('id', 'p-' + d.nick);
                        p.setAttribute('gltf-model', '#chicken');
                        p.setAttribute('class', 'player');
                        p.setAttribute('scale', '0.02 0.02 0.02');
                        document.getElementById('players').appendChild(p);
                    }
                    p.setAttribute('position', d.pos);
                    p.setAttribute('rotation', `0 ${d.rot} 0`);
                }
                if (d.type === 'hit' && d.to === myNick) {
                    hp -= d.dmg;
                    document.getElementById('hp-val').innerText = hp;
                    if (hp <= 0) { alert("ВЫ ПРОИГРАЛИ"); location.reload(); }
                }
            });
        }

        function loop() {
            setInterval(() => {
                if (mvX || mvZ) {
                    let angle = rig.getAttribute('rotation').y * (Math.PI / 180);
                    let vx = (mvZ * Math.sin(angle) + mvX * Math.cos(angle)) * 0.25;
                    let vz = (mvZ * Math.cos(angle) - mvX * Math.sin(angle)) * 0.25;
                    let p = rig.getAttribute('position');
                    
                    // Простая проверка стен (не пускаем за границы 40 метров)
                    if (Math.abs(p.x - vx) < 40 && Math.abs(p.z - vz) < 40) {
                        p.x -= vx; p.z -= vz;
                        rig.setAttribute('position', p);
                    }
                }
                if (conn && conn.open) {
                    conn.send({ type: 'sync', nick: myNick, pos: rig.getAttribute('position'), rot: rotY + 180 });
                }
            }, 20);
        }
    </script>
</body>
</html>
