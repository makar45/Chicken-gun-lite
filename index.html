<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Gun: HARDCORE EDITION</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; user-select: none; font-family: 'Arial', sans-serif; }
        
        /* ГЛАВНЫЙ ИНТЕРФЕЙС */
        #hud { position: absolute; top: 15px; left: 15px; z-index: 100; pointer-events: none; }
        .hp-container { width: 200px; height: 25px; background: rgba(0,0,0,0.7); border: 3px solid #fff; border-radius: 5px; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: #ff0000; transition: width 0.3s ease; }
        .stats { color: #fff; font-size: 22px; font-weight: bold; text-shadow: 2px 2px #000; margin-top: 5px; }

        /* МАГАЗИН (ТЕПЕРЬ НАДЕЖНЫЙ) */
        #shop-window { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: #ffcc00; border: 10px solid #fff; border-radius: 20px; z-index: 2000; padding: 20px; pointer-events: auto; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .shop-btn { width: 100%; padding: 15px; margin: 10px 0; background: #fff; border: 3px solid #333; font-weight: bold; border-radius: 10px; }
        
        /* УПРАВЛЕНИЕ (ЖЕСТКОЕ РАЗДЕЛЕНИЕ ЗОН) */
        #joy-anchor { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 50%; pointer-events: auto; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }
        
        #btn-fire { position: absolute; bottom: 60px; right: 60px; width: 120px; height: 120px; background: radial-gradient(#ff3300, #990000); border: 6px solid #fff; border-radius: 50%; color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; pointer-events: auto; font-size: 22px; box-shadow: 0 8px 0 #660000; }
        #btn-fire:active { transform: translateY(4px); box-shadow: 0 4px 0 #660000; }
        
        #btn-shop-open { position: absolute; top: 15px; right: 15px; padding: 15px 25px; background: #ffcc00; border: 4px solid #fff; border-radius: 12px; font-weight: bold; pointer-events: auto; }

        /* ВХОД В ИГРУ */
        #overlay { position: absolute; width: 100%; height: 100%; background: #1a1a1a; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .room-input { padding: 12px; font-size: 18px; border-radius: 8px; margin: 10px; text-align: center; border: none; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:#ffcc00; font-size: 40px; -webkit-text-stroke: 1px black;">CHICKEN GUN V4</h1>
        <input type="text" id="nick-in" placeholder="ТВОЙ НИК" class="room-input">
        <div style="display:flex;">
            <button onclick="boot('host')" style="background:#ff3300; color:white; padding:15px; border-radius:10px; border:none; margin:5px; font-weight:bold;">СОЗДАТЬ СЕРВЕР</button>
            <button onclick="boot('join')" style="background:#2196F3; color:white; padding:15px; border-radius:10px; border:none; margin:5px; font-weight:bold;">ЗАЙТИ К ДРУГУ</button>
        </div>
        <input type="text" id="room-in" placeholder="ID КОМНАТЫ" class="room-input">
    </div>

    <div id="hud">
        <div class="hp-container"><div id="hp-bar"></div></div>
        <div class="stats">MONEY: <span id="money-val">0</span></div>
    </div>
    <div id="crosshair"></div>
    <div id="joy-anchor"><div id="joy-stick"></div></div>
    <div id="btn-fire">ОГОНЬ</div>
    <button id="btn-shop-open" onclick="toggleShop()">МАГАЗИН</button>

    <div id="shop-window">
        <h2 style="margin-top:0">МАГАЗИН КУРИЦ</h2>
        <button class="shop-btn" onclick="buyItem('laser', 500)">ЛАЗЕР (500$)</button>
        <button class="shop-btn" onclick="buyItem('shield', 300)">БРОНЯ (300$)</button>
        <button onclick="toggleShop()" style="margin-top:10px; width:100%; padding:10px; background:#333; color:white; border-radius:8px;">ЗАКРЫТЬ</button>
    </div>

    <a-scene renderer="antialias: true; colorManagement: true;">
        <a-assets>
            <a-asset-item id="model-map" src="./chicken_gun_chalohousesnow.glb"></a-asset-item>
            <a-asset-item id="model-chicken" src="./chicken_gun.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#87CEEB"></a-sky>
        <a-entity light="type: ambient; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; intensity: 0.6; position: 1 10 1"></a-entity>

        <a-entity id="map" gltf-model="#model-map" position="0 0 0"></a-entity>

        <a-entity id="rig" position="0 0 10">
            <a-entity id="main-cam" camera position="0 1.7 0" look-controls="enabled: false" raycaster="objects: .enemy; far: 50;">
                <a-entity id="weapon" position="0.35 -0.4 -0.7">
                    <a-box width="0.1" height="0.1" depth="0.5" color="#1a1a1a"></a-box>
                    <a-cylinder rotation="90 0 0" position="0 0.05 -0.3" radius="0.03" height="0.6" color="#000"></a-cylinder>
                </a-entity>
            </a-camera>
        </a-entity>

        <a-entity id="other-players"></a-entity>
    </a-scene>

    <script>
        let peer, conn, myNick, moveX = 0, moveZ = 0, rotY = 0, rotX = 0;
        let hp = 100, money = 0, isDead = false;
        const rig = document.getElementById('rig');
        const cam = document.getElementById('main-cam');

        // --- 1. ПОВОРОТ КАМЕРЫ (ФИКС) ---
        let lastX, lastY;
        document.body.addEventListener('touchstart', e => {
            if (e.touches[0].clientX < window.innerWidth / 2 || e.target.id === 'btn-fire') return;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        }, {passive: false});

        document.body.addEventListener('touchmove', e => {
            for (let t of e.touches) {
                if (t.clientX > window.innerWidth / 2 && t.target.id !== 'btn-fire') {
                    if (lastX === undefined) return;
                    let dx = t.clientX - lastX;
                    let dy = t.clientY - lastY;
                    rotY -= dx * 0.3;
                    rotX = Math.max(-80, Math.min(80, rotX - dy * 0.3));
                    rig.setAttribute('rotation', `0 ${rotY} 0`);
                    cam.setAttribute('rotation', `${rotX} 0 0`);
                    lastX = t.clientX; lastY = t.clientY;
                }
            }
        }, {passive: false});

        // --- 2. ДЖОЙСТИК (ФИКС) ---
        const joy = document.getElementById('joy-anchor');
        const stick = document.getElementById('joy-stick');
        joy.addEventListener('touchmove', e => {
            e.preventDefault();
            let r = joy.getBoundingClientRect();
            let dx = e.touches[0].clientX - (r.left + r.width/2);
            let dy = e.touches[0].clientY - (r.top + r.height/2);
            let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            let angle = Math.atan2(dy, dx);
            stick.style.left = `calc(50% + ${Math.cos(angle)*dist}px)`;
            stick.style.top = `calc(50% + ${Math.sin(angle)*dist}px)`;
            moveX = Math.cos(angle) * (dist/50);
            moveZ = Math.sin(angle) * (dist/50);
        });
        joy.addEventListener('touchend', () => { moveX=0; moveZ=0; stick.style.left='50%'; stick.style.top='50%'; });

        // --- 3. ДВИЖЕНИЕ И КОЛЛИЗИИ (НОВОЕ!) ---
        function updatePhysics() {
            if (!isDead && (moveX || moveZ)) {
                let angle = rig.getAttribute('rotation').y * (Math.PI / 180);
                // Математика правильного вектора вперед
                let vx = (moveZ * Math.sin(angle) + moveX * Math.cos(angle)) * 0.2;
                let vz = (moveZ * Math.cos(angle) - moveX * Math.sin(angle)) * 0.2;
                
                let p = rig.getAttribute('position');
                
                // Простейшая проверка коллизий (не даем выйти за пределы дома)
                let nextX = p.x - vx;
                let nextZ = p.z - vz;
                
                // Ограничиваем координаты (подстрой под свою карту)
                if (Math.abs(nextX) < 45 && Math.abs(nextZ) < 45) {
                    p.x = nextX;
                    p.z = nextZ;
                    rig.setAttribute('position', p);
                }
            }
            if (conn && conn.open) {
                conn.send({ type: 'sync', nick: myNick, pos: rig.getAttribute('position'), rot: rotY + 180, dead: isDead });
            }
            requestAnimationFrame(updatePhysics);
        }

        // --- 4. СТРЕЛЬБА И УРОН ПО ДРУГУ ---
        document.getElementById('btn-fire').addEventListener('touchstart', e => {
            if (isDead) return;
            e.preventDefault();
            
            // Анимация отдачи
            document.getElementById('weapon').setAttribute('animation', 'property: position; to: 0.35 -0.4 -0.6; dur: 50; dir: alternate; loop: 1');

            // Проверка попадания
            let ray = cam.components.raycaster;
            let hits = ray.intersections;
            if (hits.length > 0) {
                let targetEl = hits[0].object.el;
                if (targetEl.classList.contains('enemy')) {
                    let targetNick = targetEl.id.replace('p-', '');
                    // ОТПРАВЛЯЕМ УРОН ДРУГУ
                    if (conn) conn.send({ type: 'damage', to: targetNick, amount: 25 });
                }
            }
        });

        // --- 5. СЕТЕВАЯ ЧАСТЬ (PEERJS) ---
        function boot(mode) {
            myNick = document.getElementById('nick-in').value || "Chicken";
            peer = new Peer(mode === 'host' ? 'cg-' + Math.floor(Math.random()*999) : undefined);
            
            peer.on('open', id => {
                if(mode === 'host') alert("ТВОЙ ID: " + id);
                else conn = peer.connect(document.getElementById('room-in').value);
                
                if(mode === 'host') peer.on('connection', c => { conn = c; setupNet(); });
                else setupNet();
                
                document.getElementById('overlay').style.display = 'none';
                updatePhysics();
            });
        }

        function setupNet() {
            conn.on('data', data => {
                if (data.type === 'sync') {
                    let p = document.getElementById('p-' + data.nick);
                    if (!p) {
                        p = document.createElement('a-entity');
                        p.setAttribute('id', 'p-' + data.nick);
                        p.setAttribute('gltf-model', '#model-chicken');
                        p.setAttribute('class', 'enemy'); // Чтобы прицел его видел
                        p.setAttribute('scale', '0.02 0.02 0.02');
                        p.innerHTML = `<a-text value="${data.nick}" align="center" position="0 150 0" scale="60 60 60" color="red"></a-text>`;
                        document.getElementById('other-players').appendChild(p);
                    }
                    p.setAttribute('position', data.pos);
                    p.setAttribute('rotation', `0 ${data.rot} 0`);
                    p.setAttribute('visible', !data.dead);
                }
                
                // ПОЛУЧЕНИЕ УРОНА ОТ ДРУГА
                if (data.type === 'damage' && data.to === myNick) {
                    hp -= data.amount;
                    document.getElementById('hp-bar').style.width = hp + "%";
                    if (hp <= 0 && !isDead) {
                        isDead = true;
                        alert("ВАС УБИЛИ!");
                        setTimeout(() => { 
                            hp = 100; isDead = false; 
                            rig.setAttribute('position', '0 0 5');
                            document.getElementById('hp-bar').style.width = "100%";
                        }, 3000);
                    }
                }
            });
        }

        // --- 6. МАГАЗИН ---
        function toggleShop() {
            const s = document.getElementById('shop-window');
            s.style.display = (s.style.display === 'block') ? 'none' : 'block';
        }
        function buyItem(it, pr) {
            if (money >= pr) {
                money -= pr; document.getElementById('money-val').innerText = money;
                alert("КУПЛЕНО!"); toggleShop();
            } else { alert("НЕТ ДЕНЕГ!"); }
        }
    </script>
</body>
</html>
