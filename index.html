<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Gun Pro v2.0</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #111; touch-action: none; user-select: none; font-family: 'Arial', sans-serif; }
        
        /* Загрузочный экран */
        #loader { position: absolute; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #ffcc00; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Интерфейс */
        #ui { position: absolute; width: 100%; height: 100%; z-index: 100; pointer-events: none; display: none; }
        #menu { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; display: flex; align-items: center; justify-content: center; }
        .window { background: #ffcc00; padding: 40px; border: 10px solid #fff; border-radius: 30px; text-align: center; width: 300px; box-shadow: 0 20px 0 #b89500; }
        
        input { width: 80%; padding: 15px; border-radius: 10px; border: none; font-size: 18px; margin-bottom: 10px; text-align: center; }
        .btn { padding: 15px 25px; font-size: 20px; font-weight: bold; cursor: pointer; background: #ff3300; color: white; border: none; border-radius: 15px; box-shadow: 0 5px #990000; pointer-events: auto; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px #990000; }

        #joystick { position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px; background: rgba(255,255,255,0.15); border: 3px solid rgba(255,255,255,0.4); border-radius: 50%; pointer-events: auto; }
        #stick { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(0,0,0,0.3); }
        #fire { position: absolute; bottom: 60px; right: 60px; width: 120px; height: 120px; background: radial-gradient(#ff5500, #cc2200); border: 6px solid #fff; border-radius: 50%; color: white; font-weight: bold; font-size: 22px; pointer-events: auto; text-shadow: 2px 2px 4px #000; }
        #stats { position: absolute; top: 20px; left: 20px; color: gold; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>ЗАГРУЗКА КАРТЫ...</p>
    </div>

    <div id="menu">
        <div class="window">
            <h1 style="margin:0 0 20px 0; color: #ff3300; -webkit-text-stroke: 1px white;">CHICKEN GUN</h1>
            <input type="text" id="nick" placeholder="ТВОЙ НИК" maxlength="12">
            <br>
            <button class="btn" onclick="init('host')">СОЗДАТЬ СЕРВЕР</button>
            <p style="margin:10px 0; font-weight:bold;">ИЛИ</p>
            <input type="text" id="join-id" placeholder="ID КОМНАТЫ">
            <button class="btn" style="background:#2196F3; box-shadow: 0 5px #0d47a1;" onclick="init('join')">ЗАЙТИ К ДРУГУ</button>
        </div>
    </div>

    <div id="ui">
        <div id="stats">COINS: <span id="c-val">0</span></div>
        <div id="joystick"><div id="stick"></div></div>
        <button id="fire">FIRE!</button>
    </div>

    <a-scene renderer="antialias: true; colorManagement: true; logarithmicDepthBuffer: true;">
        <a-assets timeout="30000">
            <a-asset-item id="map-asset" src="./chicken_gun_chalohousesnow.glb"></a-asset-item>
            <a-asset-item id="chicken-asset" src="./chicken_gun.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#87CEEB"></a-sky>
        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="5 10 5" intensity="0.8"></a-light>

        <a-entity id="main-map" gltf-model="#map-asset" position="0 0 0"></a-entity>

        <a-entity id="rig" position="0 0 10">
            <a-entity id="camera" camera position="0 1.6 0" look-controls="enabled: false">
                <a-entity id="weapon" position="0.35 -0.4 -0.7">
                    <a-box width="0.1" height="0.15" depth="0.5" color="#222"></a-box>
                    <a-cylinder rotation="90 0 0" position="0 0.05 -0.3" radius="0.03" height="0.6" color="#000"></a-cylinder>
                </a-entity>
            </a-camera>
        </a-entity>

        <a-entity id="network-players"></a-entity>
    </a-scene>

    <script>
        let peer, conn, myNick, moveX = 0, moveZ = 0, rotY = 0, rotX = 0;
        let isReady = false;

        // Ждем загрузки всех моделей
        window.addEventListener('load', () => {
            const scene = document.querySelector('a-scene');
            if (scene.hasLoaded) onLoaded(); else scene.addEventListener('loaded', onLoaded);
        });

        function onLoaded() {
            document.getElementById('loader').style.display = 'none';
        }

        // СУПЕР ПЛАВНЫЙ SWIPE
        let lastTouchX, lastTouchY;
        document.body.addEventListener('touchstart', e => {
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
        }, {passive: false});

        document.body.addEventListener('touchmove', e => {
            if (!isReady || e.target.closest('#joystick') || e.target.id === 'fire') return;
            const dx = e.touches[0].clientX - lastTouchX;
            const dy = e.touches[0].clientY - lastTouchY;
            
            rotY -= dx * 0.25;
            rotX = Math.max(-70, Math.min(70, rotX - dy * 0.25));
            
            document.getElementById('rig').setAttribute('rotation', `0 ${rotY} 0`);
            document.getElementById('camera').setAttribute('rotation', `${rotX} 0 0`);
            
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
        }, {passive: false});

        // ДЖОЙСТИК
        const joy = document.getElementById('joystick');
        const stick = document.getElementById('stick');
        joy.addEventListener('touchmove', e => {
            const rect = joy.getBoundingClientRect();
            const dx = e.touches[0].clientX - (rect.left + rect.width/2);
            const dy = e.touches[0].clientY - (rect.top + rect.height/2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 55);
            const angle = Math.atan2(dy, dx);
            
            stick.style.left = `calc(50% + ${Math.cos(angle)*dist}px)`;
            stick.style.top = `calc(50% + ${Math.sin(angle)*dist}px)`;
            
            moveX = Math.cos(angle) * (dist/55);
            moveZ = Math.sin(angle) * (dist/55);
        });
        joy.addEventListener('touchend', () => {
            stick.style.left = '50%'; stick.style.top = '50%';
            moveX = 0; moveZ = 0;
        });

        // СЕТЕВАЯ ЧАСТЬ
        function init(mode) {
            myNick = document.getElementById('nick').value.trim() || "Chicken_" + Math.floor(Math.random()*99);
            const id = mode === 'host' ? 'cg-' + Math.floor(1000 + Math.random()*9000) : undefined;
            
            peer = new Peer(id, { debug: 1 });
            
            peer.on('open', myId => {
                if (mode === 'host') alert("Твой ID комнаты: " + myId);
                else {
                    const target = document.getElementById('join-id').value;
                    conn = peer.connect(target);
                    setupConn();
                }
                document.getElementById('menu').style.display = 'none';
                document.getElementById('ui').style.display = 'block';
                isReady = true;
                startLoop();
            });

            peer.on('connection', c => {
                conn = c;
                setupConn();
            });
        }

        function setupConn() {
            conn.on('data', data => {
                let p = document.getElementById('p-' + data.nick);
                if (!p) {
                    p = document.createElement('a-entity');
                    p.setAttribute('id', 'p-' + data.nick);
                    p.setAttribute('gltf-model', '#chicken-asset');
                    p.setAttribute('scale', '0.02 0.02 0.02'); // Масштаб курицы!
                    p.innerHTML = `<a-text value="${data.nick}" align="center" position="0 150 0" scale="60 60 60" color="#ff0000"></a-text>`;
                    document.getElementById('network-players').appendChild(p);
                }
                // Плавное перемещение (интерполяция)
                p.setAttribute('position', data.pos);
                p.setAttribute('rotation', `0 ${data.rot} 0`);
            });
        }

        function startLoop() {
            setInterval(() => {
                if (!isReady) return;
                
                if (moveX || moveZ) {
                    const r = document.getElementById('rig').getAttribute('rotation').y * (Math.PI/180);
                    const pos = document.getElementById('rig').getAttribute('position');
                    // Расчет вектора движения относительно камеры
                    const dx = (moveX * Math.cos(r) + moveZ * Math.sin(r)) * 0.18;
                    const dz = (moveX * -Math.sin(r) + moveZ * Math.cos(r)) * 0.18;
                    
                    // Простая проверка границ карты (чтобы не уйти в бесконечность)
                    if (Math.abs(pos.x + dz) < 45 && Math.abs(pos.z + dx) < 45) {
                        pos.x += dz;
                        pos.z += dx;
                        document.getElementById('rig').setAttribute('position', pos);
                    }
                }
                
                if (conn && conn.open) {
                    conn.send({
                        nick: myNick,
                        pos: document.getElementById('rig').getAttribute('position'),
                        rot: rotY + 180
                    });
                }
            }, 20);
        }

        // СТРЕЛЬБА
        let coins = 0;
        document.getElementById('fire').onclick = () => {
            coins += 5;
            document.getElementById('c-val').innerText = coins;
            const w = document.getElementById('weapon');
            w.setAttribute('animation', 'property: position; to: 0.35 -0.4 -0.6; dur: 50; dir: alternate; loop: 1');
        };
    </script>
</body>
</html>
