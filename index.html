<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Gun: Ultimate Edition</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; user-select: none; font-family: 'Segoe UI', sans-serif; }
        
        /* ГЛАВНЫЙ HUD */
        #game-ui { position: absolute; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        #hud-top { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .hp-container { width: 220px; height: 24px; background: rgba(0,0,0,0.6); border: 3px solid #fff; border-radius: 6px; position: relative; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #ff5555); transition: width 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .money-text { color: #ffcc00; font-size: 26px; font-weight: 900; text-shadow: 3px 3px 0 #000; }

        /* УПРАВЛЕНИЕ (ЖЕЛЕЗОБЕТОННОЕ) */
        #controls-zone { position: absolute; width: 100%; height: 100%; z-index: 200; }
        
        #joystick-base { position: absolute; bottom: 60px; left: 60px; width: 140px; height: 140px; background: rgba(255,255,255,0.1); border: 4px solid #fff; border-radius: 50%; pointer-events: auto; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        #fire-button { position: absolute; bottom: 60px; right: 60px; width: 120px; height: 120px; background: #f44336; border: 6px solid #fff; border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 24px; box-shadow: 0 10px 0 #b71c1c; }
        #fire-button:active { transform: translateY(5px); box-shadow: 0 5px 0 #b71c1c; }

        /* МАГАЗИН И МЕНЮ */
        #shop-trigger { position: absolute; top: 20px; right: 20px; padding: 15px 30px; background: #ffcc00; border: 4px solid #fff; border-radius: 12px; pointer-events: auto; font-weight: bold; cursor: pointer; }
        
        #shop-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; background: #2c3e50; border: 8px solid #ffcc00; border-radius: 20px; z-index: 1000; padding: 25px; pointer-events: auto; color: white; }
        .shop-item { background: #34495e; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 2px solid #5d6d7e; }
        .buy-btn { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; }

        #start-overlay { position: absolute; width: 100%; height: 100%; background: #121212; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-box { background: #f1c40f; padding: 40px; border-radius: 30px; border: 10px solid #fff; text-align: center; box-shadow: 0 20px 0 #d4ac0d; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #00ff00; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ff00; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="start-box">
            <h1 style="font-size: 48px; margin: 0 0 20px 0; -webkit-text-stroke: 2px black;">CHICKEN GUN</h1>
            <input type="text" id="player-nick" placeholder="НИКНЕЙМ" style="padding:15px; font-size:20px; width:250px; border-radius:10px; border:none;"><br><br>
            <button onclick="initNetwork('host')" style="padding:15px 40px; background:#e74c3c; color:#fff; border:none; border-radius:12px; font-size:22px; font-weight:bold; cursor:pointer;">СОЗДАТЬ</button>
            <p style="font-weight:bold;">ИЛИ</p>
            <input type="text" id="room-input" placeholder="ID КОМНАТЫ" style="padding:10px; width:200px; border-radius:8px;"><br><br>
            <button onclick="initNetwork('join')" style="padding:12px 30px; background:#3498db; color:#fff; border:none; border-radius:12px; font-size:20px; font-weight:bold;">ЗАЙТИ К ДРУГУ</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="hud-top">
            <div class="hp-container"><div id="hp-bar"></div></div>
            <div class="money-text">МОНЕТЫ: <span id="m-count">0</span></div>
        </div>
        <div id="crosshair"></div>
        <div id="joystick-base"><div id="joystick-knob"></div></div>
        <div id="fire-button">ОГОНЬ</div>
        <div id="shop-trigger" onclick="toggleShop(true)">МАГАЗИН</div>
    </div>

    <div id="shop-modal">
        <h2 style="text-align:center; color:#f1c40f;">ОРУЖЕЙНАЯ</h2>
        <div class="shop-item">
            <div><b>ПИСТОЛЕТ</b><br><small>Урон: 20</small></div>
            <button class="buy-btn" onclick="buyItem('pistol', 0)">ВЗЯТЬ</button>
        </div>
        <div class="shop-item">
            <div><b>ВИНТОВКА</b><br><small>Урон: 45</small></div>
            <button class="buy-btn" onclick="buyItem('rifle', 500)">500$</button>
        </div>
        <button onclick="toggleShop(false)" style="width:100%; padding:12px; background:#e74c3c; color:white; border:none; border-radius:10px; margin-top:15px; font-weight:bold;">ВЫХОД</button>
    </div>

    <a-scene renderer="antialias: true; colorManagement: true;" physics="debug: false">
        <a-assets>
            <a-asset-item id="map-model" src="./chicken_gun_chalohousesnow.glb"></a-asset-item>
            <a-asset-item id="chicken-model" src="./chicken_gun.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#87CEEB"></a-sky>
        <a-entity light="type: ambient; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; intensity: 0.6; position: 2 10 3"></a-entity>

        <a-entity id="world-map" gltf-model="#map-model" position="0 0 0" shadow="receive: true"></a-entity>

        <a-entity id="player-rig" position="0 0 10">
            <a-entity id="player-cam" camera position="0 1.7 0" look-controls="enabled: false" raycaster="objects: .remote-player; far: 50;">
                <a-entity id="weapon-view" position="0.35 -0.4 -0.8">
                    <a-box width="0.08" height="0.1" depth="0.5" color="#2c3e50">
                        <a-light id="muzzle-flash" type="point" color="orange" intensity="0" position="0 0 -0.4"></a-light>
                    </a-box>
                    <a-cylinder rotation="90 0 0" position="0 0.04 -0.3" radius="0.03" height="0.6" color="#000"></a-cylinder>
                </a-entity>
            </a-entity>
        </a-entity>

        <a-entity id="remote-players"></a-entity>
    </a-scene>

    <script>
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        let peer, conn, myNick;
        let moveX = 0, moveZ = 0, rotY = 0, rotX = 0;
        let hp = 100, money = 0, isDead = false;
        const rig = document.getElementById('player-rig');
        const cam = document.getElementById('player-cam');

        // --- 1. СИСТЕМА УПРАВЛЕНИЯ КАМЕРОЙ ---
        let touchStartPos = { x: 0, y: 0 };
        document.body.addEventListener('touchstart', e => {
            if (e.touches[0].clientX > window.innerWidth / 2) {
                touchStartPos.x = e.touches[0].clientX;
                touchStartPos.y = e.touches[0].clientY;
            }
        }, { passive: false });

        document.body.addEventListener('touchmove', e => {
            for (let i = 0; i < e.touches.length; i++) {
                let touch = e.touches[i];
                if (touch.clientX > window.innerWidth / 2 && touch.target.id !== 'fire-button') {
                    let dx = touch.clientX - touchStartPos.x;
                    let dy = touch.clientY - touchStartPos.y;
                    
                    rotY -= dx * 0.25;
                    rotX = Math.max(-85, Math.min(85, rotX - dy * 0.25));
                    
                    rig.setAttribute('rotation', `0 ${rotY} 0`);
                    cam.setAttribute('rotation', `${rotX} 0 0`);
                    
                    touchStartPos.x = touch.clientX;
                    touchStartPos.y = touch.clientY;
                }
            }
        }, { passive: false });

        // --- 2. СИСТЕМА ДЖОЙСТИКА ---
        const jBase = document.getElementById('joystick-base');
        const jKnob = document.getElementById('joystick-knob');
        
        jBase.addEventListener('touchmove', e => {
            e.preventDefault();
            let touch = e.touches[0];
            let rect = jBase.getBoundingClientRect();
            let centerX = rect.left + rect.width / 2;
            let centerY = rect.top + rect.height / 2;
            
            let diffX = touch.clientX - centerX;
            let diffY = touch.clientY - centerY;
            let dist = Math.min(Math.sqrt(diffX*diffX + diffY*diffY), 60);
            let angle = Math.atan2(diffY, diffX);
            
            jKnob.style.left = `calc(50% + ${Math.cos(angle) * dist}px)`;
            jKnob.style.top = `calc(50% + ${Math.sin(angle) * dist}px)`;
            
            moveX = Math.cos(angle) * (dist / 60);
            moveZ = Math.sin(angle) * (dist / 60);
        });

        jBase.addEventListener('touchend', () => {
            jKnob.style.left = '50%'; jKnob.style.top = '50%';
            moveX = 0; moveZ = 0;
        });

        // --- 3. ФИЗИКА ДВИЖЕНИЯ И КОЛЛИЗИИ ---
        function gameLoop() {
            if (!isDead && (moveX !== 0 || moveZ !== 0)) {
                let angleRad = rig.getAttribute('rotation').y * (Math.PI / 180);
                
                // Рассчитываем вектор движения относительно взгляда
                let vx = (moveZ * Math.sin(angleRad) + moveX * Math.cos(angleRad)) * 0.22;
                let vz = (moveZ * Math.cos(angleRad) - moveX * Math.sin(angleRad)) * 0.22;
                
                let currentPos = rig.getAttribute('position');
                
                // Простейшая проверка границ (Коллизии со стенами карты)
                // Если карта Chalo House имеет размер примерно 50x50
                let newX = currentPos.x - vx;
                let newZ = currentPos.z - vz;

                // Невидимые стены (подстрой цифры под glb карту)
                if (Math.abs(newX) < 48 && Math.abs(newZ) < 48) {
                    currentPos.x = newX;
                    currentPos.z = newZ;
                    rig.setAttribute('position', currentPos);
                }
            }

            // Отправка данных в сеть
            if (conn && conn.open) {
                conn.send({
                    type: 'sync',
                    nick: myNick,
                    pos: rig.getAttribute('position'),
                    rot: rotY + 180,
                    dead: isDead
                });
            }
            requestAnimationFrame(gameLoop);
        }

        // --- 4. СТРЕЛЬБА И СЕТЕВОЙ УРОН ---
        document.getElementById('fire-button').addEventListener('touchstart', e => {
            if (isDead) return;
            e.preventDefault();

            // Анимация отдачи оружия
            const weapon = document.getElementById('weapon-view');
            weapon.setAttribute('animation', 'property: position; to: 0.35 -0.4 -0.6; dur: 60; dir: alternate; loop: 1');

            // Вспышка выстрела
            const flash = document.getElementById('muzzle-flash');
            flash.setAttribute('light', 'intensity', 3);
            setTimeout(() => flash.setAttribute('light', 'intensity', 0), 60);

            // Проверка попадания по классу .remote-player
            let raycaster = cam.components.raycaster;
            let intersections = raycaster.intersections;

            if (intersections.length > 0) {
                let target = intersections[0].object.el;
                if (target.classList.contains('remote-player')) {
                    let targetID = target.id.replace('p-', '');
                    if (conn) {
                        conn.send({
                            type: 'damage',
                            target: targetID,
                            value: 25 // УРОН ТЕПЕРЬ ТУТ
                        });
                    }
                }
            }
        });

        // --- 5. СЕТЕВОЙ МОДУЛЬ (PEERJS) ---
        function initNetwork(mode) {
            myNick = document.getElementById('player-nick').value || "Chicken_" + Math.floor(Math.random()*99);
            peer = new Peer(mode === 'host' ? 'cg-' + Math.floor(Math.random()*999) : undefined);
            
            peer.on('open', id => {
                if (mode === 'host') alert("ID ТВОЕЙ КОМНАТЫ: " + id);
                else {
                    let roomID = document.getElementById('room-input').value;
                    conn = peer.connect(roomID);
                }
                
                if (mode === 'host') {
                    peer.on('connection', c => {
                        conn = c;
                        setupConnection();
                    });
                } else {
                    setupConnection();
                }
                
                document.getElementById('start-overlay').style.display = 'none';
                gameLoop();
            });
        }

        function setupConnection() {
            conn.on('data', data => {
                // Синхронизация других игроков
                if (data.type === 'sync') {
                    let p = document.getElementById('p-' + data.nick);
                    if (!p) {
                        p = document.createElement('a-entity');
                        p.setAttribute('id', 'p-' + data.nick);
                        p.setAttribute('gltf-model', '#chicken-model');
                        p.setAttribute('class', 'remote-player');
                        p.setAttribute('scale', '0.022 0.022 0.022');
                        p.innerHTML = `<a-text value="${data.nick}" align="center" position="0 160 0" scale="60 60 60" color="red"></a-text>`;
                        document.getElementById('remote-players').appendChild(p);
                    }
                    p.setAttribute('position', data.pos);
                    p.setAttribute('rotation', `0 ${data.rot} 0`);
                    p.setAttribute('visible', !data.dead);
                }

                // ОБРАБОТКА ПОЛУЧЕНИЯ УРОНА
                if (data.type === 'damage' && data.target === myNick) {
                    hp -= data.value;
                    document.getElementById('hp-bar').style.width = hp + "%";
                    
                    if (hp <= 0 && !isDead) {
                        isDead = true;
                        alert("ВЫ ПОГИБЛИ!");
                        setTimeout(() => {
                            hp = 100; isDead = false;
                            document.getElementById('hp-bar').style.width = "100%";
                            rig.setAttribute('position', '0 0 10');
                        }, 4000);
                    }
                }
            });
        }

        // --- 6. МАГАЗИН И ПРЕДМЕТЫ ---
        function toggleShop(show) {
            document.getElementById('shop-modal').style.display = show ? 'block' : 'none';
        }

        function buyItem(id, price) {
            if (money >= price) {
                money -= price;
                document.getElementById('m-count').innerText = money;
                alert("ОРУЖИЕ ОБНОВЛЕНО!");
                if (id === 'rifle') document.getElementById('weapon-view').querySelector('a-box').setAttribute('color', '#7f8c8d');
                toggleShop(false);
            } else {
                alert("НУЖНО БОЛЬШЕ ЗОЛОТА!");
            }
        }
    </script>
</body>
</html>
