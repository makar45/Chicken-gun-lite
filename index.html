<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Chicken Gun: Chalo House Online</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; }
        #menu-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .ui-panel { background: #ffcc00; padding: 25px; border-radius: 20px; border: 6px solid #fff; text-align: center; color: #333; }
        input { padding: 12px; font-size: 18px; border-radius: 8px; border: none; margin: 10px 0; width: 220px; }
        button { padding: 12px 24px; font-size: 18px; font-weight: bold; cursor: pointer; background: #ff3300; color: #fff; border: none; border-radius: 12px; margin: 5px; box-shadow: 0 4px #990000; }
        button:active { box-shadow: none; transform: translateY(4px); }
        
        #hud { position: absolute; top: 15px; left: 15px; color: gold; z-index: 100; font-size: 20px; font-weight: bold; text-shadow: 2px 2px #000; display: none; }
        #shop-modal { display: none; position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; background: rgba(34,34,34,0.95); border: 5px solid #ffcc00; z-index: 2000; border-radius: 20px; color: white; flex-direction: column; align-items: center; padding: 20px; }
        
        #controls { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 100; }
        .fire-btn { width: 90px; height: 90px; background: rgba(255, 51, 0, 0.8); border: 4px solid #fff; border-radius: 50%; color: white; font-weight: bold; }
        .shop-trigger { width: 80px; height: 80px; background: #FFA500; border: 4px solid #fff; border-radius: 15px; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu-overlay">
        <div class="ui-panel">
            <h1 style="margin:0 0 15px 0">CHICKEN GUN AI</h1>
            <input type="text" id="nick-input" placeholder="Твой ник..." value="Курица_1">
            <br>
            <button onclick="startServer()">СОЗДАТЬ СЕРВЕР</button>
            <br>
            <input type="text" id="join-id" placeholder="ID друга...">
            <br>
            <button onclick="joinServer()">ПОДКЛЮЧИТЬСЯ</button>
            <p id="peer-id-display" style="font-size: 14px; color: #555;"></p>
        </div>
    </div>

    <div id="shop-modal">
        <h2>МАГАЗИН ОРУЖИЯ</h2>
        <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;" id="shop-items">
            </div>
        <button onclick="toggleShop()" style="margin-top: 20px; background: #666;">ЗАКРЫТЬ</button>
    </div>

    <div id="hud">
        МОНЕТЫ: <span id="coin-count">100</span> | ID: <span id="room-id">...</span>
    </div>

    <div id="controls">
        <button class="shop-trigger" onclick="toggleShop()">SHOP</button>
        <button class="fire-btn" onclick="fire()">ОГОНЬ</button>
    </div>

    <a-scene background="color: #87CEEB">
        <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
        <a-entity light="type: directional; intensity: 0.6; position: -1 2 1"></a-entity>

        <a-entity id="map">
            <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#4CAF50"></a-plane>
            
            <a-box position="0 2.5 -5" width="10" height="5" depth="0.2" color="#2196F3"></a-box> <a-box position="-5 2.5 0" width="0.2" height="5" depth="10" color="#2196F3"></a-box> <a-box position="5 2.5 0" width="0.2" height="5" depth="10" color="#2196F3"></a-box> <a-box position="2.5 2.5 5" width="5" height="5" depth="0.2" color="#2196F3"></a-box> <a-cone position="0 6.5 0" radius-bottom="8" height="3" segments-radial="4" rotation="0 45 0" color="#D32F2F"></a-cone>
            
            <a-box position="-2 0.5 -2" width="1.5" height="1" depth="1.5" color="#8B4513"></a-box> <a-box position="2 0.5 -3" width="1" height="1" depth="1" color="#FFA500"></a-box> </a-entity>

        <a-entity id="rig" position="0 0 8">
            <a-camera look-controls="pointerLockEnabled: false">
                <a-entity id="weapon-visual" position="0.3 -0.3 -0.5" rotation="0 180 0" geometry="primitive: box; width: 0.1; height: 0.1; depth: 0.4" material="color: #333"></a-entity>
            </a-camera>
        </a-entity>

        <a-entity id="players-container"></a-entity>
    </a-scene>

    <script>
        let peer, conn, myNick = "Курица";
        let coins = 100;
        let currentWeapon = "Пистолет";
        const weapons = {
            "Пистолет": { price: 0, color: "#333", power: 1 },
            "АК-47": { price: 150, color: "#8B4513", power: 2 },
            "Лазер": { price: 500, color: "#00ffff", power: 5 }
        };

        // ЛОГИКА ОНЛАЙНА
        function initPeer(id) {
            peer = new Peer(id);
            peer.on('open', (myId) => {
                document.getElementById('peer-id-display').innerText = "ID комнаты: " + myId;
                document.getElementById('room-id').innerText = myId;
            });
            peer.on('connection', (c) => {
                conn = c;
                setupConnection();
                startGame();
            });
        }

        function startServer() {
            myNick = document.getElementById('nick-input').value;
            const roomId = 'cg-' + Math.floor(100 + Math.random() * 899);
            initPeer(roomId);
            startGame();
        }

        function joinServer() {
            myNick = document.getElementById('nick-input').value;
            const targetId = document.getElementById('join-id').value;
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(targetId);
                setupConnection();
                startGame();
            });
        }

        function setupConnection() {
            conn.on('data', (data) => {
                if(data.type === 'sync') updateRemotePlayer(data);
            });
        }

        function startGame() {
            document.getElementById('menu-overlay').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            
            setInterval(() => {
                if (conn && conn.open) {
                    conn.send({
                        type: 'sync',
                        nick: myNick,
                        pos: document.getElementById('rig').getAttribute('position'),
                        rot: document.getElementById('rig').querySelector('a-camera').getAttribute('rotation'),
                        weaponColor: weapons[currentWeapon].color
                    });
                }
            }, 50);
        }

        function updateRemotePlayer(data) {
            let p = document.getElementById('player-' + data.nick);
            if (!p) {
                p = document.createElement('a-entity');
                p.setAttribute('id', 'player-' + data.nick);
                p.innerHTML = `
                    <a-sphere radius="0.6" color="#fff"></a-sphere>
                    <a-text value="${data.nick}" align="center" position="0 1.2 0" scale="1.5 1.5 1.5" color="yellow"></a-text>
                    <a-box id="remote-wpn-${data.nick}" position="0.3 0 -0.5" width="0.1" height="0.1" depth="0.4"></a-box>
                `;
                document.getElementById('players-container').appendChild(p);
            }
            p.setAttribute('position', data.pos);
            p.setAttribute('rotation', `0 ${data.rot.y} 0`);
            document.getElementById(`remote-wpn-${data.nick}`).setAttribute('material', 'color', data.weaponColor);
        }

        // МАГАЗИН
        function toggleShop() {
            const m = document.getElementById('shop-modal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
            renderShop();
        }

        function renderShop() {
            const cont = document.getElementById('shop-items');
            cont.innerHTML = '';
            for (let name in weapons) {
                const w = weapons[name];
                const btn = document.createElement('button');
                btn.innerHTML = `${name}<br>${w.price} мон.`;
                btn.onclick = () => buyWeapon(name);
                if (coins < w.price && name !== currentWeapon) btn.style.background = "#555";
                cont.appendChild(btn);
            }
        }

        function buyWeapon(name) {
            if (name === currentWeapon) return;
            if (coins >= weapons[name].price) {
                coins -= weapons[name].price;
                currentWeapon = name;
                document.getElementById('coin-count').innerText = coins;
                document.getElementById('weapon-visual').setAttribute('material', 'color', weapons[name].color);
                toggleShop();
            } else {
                alert("Недостаточно монет!");
            }
        }

        function fire() {
            // Просто эффект вспышки для видео
            const w = document.getElementById('weapon-visual');
            w.setAttribute('animation', 'property: position; to: 0.3 -0.3 -0.4; dur: 50; dir: alternate; loop: 1');
            // Добавляем +1 монету за выстрел (просто для теста магазина)
            coins += 1;
            document.getElementById('coin-count').innerText = coins;
        }
    </script>
</body>
</html>
